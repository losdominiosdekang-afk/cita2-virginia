<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Quién es Quién</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .tablero {
            display: grid;
            grid-template-columns: repeat(6, 120px);
            gap: 20px; /* Más separación */
        }

        .cuadro {
            width: 120px;
            height: 120px;
            background-color: #4a90e2;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 32px;
            font-weight: bold;
            color: black;
        }

        .cuadro:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="tablero" id="tablero"></div>

<script>
    const tablero = document.getElementById("tablero");

    for (let i = 1; i <= 30; i++) {
        const cuadro = document.createElement("div");
        cuadro.classList.add("cuadro");

        // Número dentro del cuadrado
        cuadro.textContent = i;

        cuadro.addEventListener("click", () => {
            alert("Has pulsado el cuadrado " + i);
        });

        tablero.appendChild(cuadro);
    }
</script>

</body>
</html>
