<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Quién es Quién</title>

    <style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px 0;
    background-color: #f0f0f0;
    font-family: Arial, sans-serif;
}

.tablero {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    width: 95%;
    max-width: 700px;
    min-height: 600px;
}
        
.cuadro {
    aspect-ratio: 1;
    background-color: #4a90e2;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.2s;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: clamp(20px, 4vw, 32px);
    font-weight: bold;
    color: black;
}

        .contenedor{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

#reiniciar{
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
    border-radius:8px;
}

        .cuadro:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>


    <div class="contenedor">

    <div class="tablero" id="tablero"></div>
    <button onclick="localStorage.clear(); location.reload();"
            id="reiniciar">
        Reiniciar progreso
    </button>

</div>

<script>
    const tablero = document.getElementById("tablero");

    for (let i = 1; i <= 30; i++) {
        const cuadro = document.createElement("div");
        cuadro.classList.add("cuadro");

        // Comprobar si ya fue visitado
        if (localStorage.getItem(`anime${i}`) === "leido") {
            cuadro.textContent = "✓ " + i;
            cuadro.style.backgroundColor = "#4CAF50";
        } else {
            cuadro.textContent = i;
        }

        cuadro.addEventListener("click", () => {
            // Guardar como leído
            localStorage.setItem(`anime${i}`, "leido");

            // Ir a la página correspondiente
            window.location.href = `anime${i}.html`;
        });

        tablero.appendChild(cuadro);
    }
</script>

</body>
</html>
