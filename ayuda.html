<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¿Crees en el amor?</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        background: linear-gradient(
            135deg,
            #ffd6e7,
            #ffe8cc,
            #e7d8ff
        );

        font-family: Georgia, serif;
    }

    .tarjeta {
        background-color: rgba(255,255,255,0.85);
        padding: 60px;
        border-radius: 30px;
        text-align: center;
        box-shadow: 0 0 25px rgba(0,0,0,0.15);
    }

    h1 {
        font-size: 70px;
        font-style: italic;
        color: #b14d78;
        margin: 0;
    }
</style>


</head>
<body>


<div class="tarjeta">
    <h1 id="mensaje"></h1>
</div>

<script>
const frases = [
    "¡Pide ayuda!",
    "Una lástima",
    "Te quedas sin saber la pregunta",
    "¡Puedes hacerlo mucho mejor!",
];

const aleatorio = Math.floor(Math.random() * frases.length);

document.getElementById("mensaje").textContent = frases[aleatorio];
</script>
    
</body>
</html>
